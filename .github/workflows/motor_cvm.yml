name: ⚙️ Motor Diário B3/CVM

on:
  schedule:
    # Roda todos os dias às 09:00 UTC (06:00 horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite que você rode manualmente clicando no botão do GitHub

jobs:
  atualizar-dados-financeiros:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Executar Motores de Extração (FNET/CVM)
        env:
          PYTHONPATH: .
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: python pipeline_dados/executar_pipeline.py

      - name: 💾 Salvar Banco de Dados no Repositório
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          echo "🔍 Verificando se o arquivo está ignorado pelo Git..."
          git check-ignore -v pipeline_dados/banco_institucional.db || echo "Arquivo não está ignorado."

          echo "🚀 Forçando adição do banco..."
          git add -f pipeline_dados/banco_institucional.db
          
          git commit -m "🤖 [Auto] Atualização diária do Banco de Dados CVM/B3" || echo "Nenhuma mudança para commitar."
          git push
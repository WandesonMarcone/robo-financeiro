name: ⚙️ Motor Diário B3/CVM

on:
  schedule:
    # Roda todos os dias às 09:00 UTC (06:00 horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite que você rode manualmente clicando no botão do GitHub

jobs:
  atualizar-dados-financeiros:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas SQLAlchemy

      - name: 🚀 Executar Motores de Extração (FNET/CVM)
        run: python pipeline_dados/executar_pipeline.py

      - name: 💾 Salvar Banco de Dados no Repositório
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add pipeline_dados/banco_institucional.db
          # O comando abaixo tenta commitar. Se não houver documento novo hoje, ele não faz nada e não dá erro.
          git commit -m "🤖 [Auto] Atualização diária do Banco de Dados CVM/B3" || echo "Nenhum dado novo para salvar hoje."
          git push
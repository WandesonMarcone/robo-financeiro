name: ⚙️ Motor Diário B3/CVM

on:
  schedule:
    # Roda todos os dias às 09:00 UTC (06:00 horário de Brasília)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite que você rode manualmente clicando no botão do GitHub

jobs:
  atualizar-dados-financeiros:
    runs-on: ubuntu-latest
    permissions:               # ADICIONE ESTA LINHA
      contents: write          # ADICIONE ESTA LINHA

    steps:
      - name: 📥 Checkout do Repositório
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas SQLAlchemy

      - name: 🚀 Executar Motores de Extração (FNET/CVM)
        run: python pipeline_dados/executar_pipeline.py

      - name: 💾 Salvar Banco de Dados no Repositório
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # Checa se o arquivo existe antes de adicionar
          if [ -f "pipeline_dados/banco_institucional.db" ]; then
            git add pipeline_dados/banco_institucional.db
            git commit -m "🤖 [Auto] Atualização diária do Banco de Dados CVM/B3" || echo "Nenhuma mudança no arquivo para commitar."
            git push
          else
            echo "⚠️ Arquivo de banco de dados não encontrado. O pipeline não gerou o arquivo?"
          fi
name: Robô Financeiro

on:
  schedule:
    - cron: '0 13,17,20 * * 1-5' # Horários em UTC (Soma 3 horas a mais que o Brasil)

  workflow_dispatch: # Permite rodar manualmente a qualquer hora do dia pelo painel Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar arquivo de credenciais
        shell: python
        run: |
          import os
          with open('credenciais.json', 'w') as f:
              f.write(os.environ['GOOGLE_CREDS'])
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Rodar o Robô
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py